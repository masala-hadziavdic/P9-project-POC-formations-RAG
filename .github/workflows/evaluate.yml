name: Evaluate RAG

on:
  push:
    branches:
      - main
    paths:
      - "scripts/**"
      - "rag/**"
      - "api/**"
      - "tests/**"
      - "data/annotated_dataset.json"
      - "pyproject.toml"
      - "requirements.txt"

jobs:
  evaluate:
    runs-on: ubuntu-latest

    env:
      MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}

    steps:

      # ==========================================
      # Checkout
      # ==========================================
      - name: Checkout repository
        uses: actions/checkout@v4


      # ==========================================
      # Python
      # ==========================================
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"


      # ==========================================
      # Dependencies
      # ==========================================
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt


      # ==========================================
      # Configure Python path
      # ==========================================
      - name: Configure PYTHONPATH
        run: |
          echo "PYTHONPATH=${{ github.workspace }}" >> $GITHUB_ENV


      # ==========================================
      # Build RAG index
      # ==========================================
      - name: Build RAG index
        run: |
          python scripts/build_index.py


      # ==========================================
      # Start API
      # ==========================================
      - name: Start FastAPI
        run: |
          uvicorn api.main:app --host 127.0.0.1 --port 8000 > api.log 2>&1 &
          sleep 60
          cat api.log

      # ==========================================
      # Tests
      # ==========================================
      - name: Run unit tests
        run: |
          pytest tests/


      # ==========================================
      # Evaluation classique
      # ==========================================
      - name: Evaluate RAG (classical)
        run: |
          python scripts/evaluate_rag.py


      # ==========================================
      # Evaluation Mistral
      # ==========================================
      - name: Evaluate RAG (RAGAS)
        run: |
          python scripts/evaluate_rag_llm.py


      # ==========================================
      # Save evaluation results
      # ==========================================
      - name: Upload evaluation results
        uses: actions/upload-artifact@v4
        with:
          name: mistral-evaluation-results
          path: |
            evaluation_results.csv
            evaluation_results.json